<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Chem-Assembler 回帰テスト</title>
    <style>
        body { font-family: "Noto Sans JP", sans-serif; background: #0a0c10; color: #f5f6fa; margin: 0; padding: 16px; }
        h1 { font-size: 18px; margin: 0 0 4px 0; }
        .note { color: #a0a8c0; font-size: 12px; margin-bottom: 12px; }
        #summary { font-size: 15px; font-weight: bold; padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; background: #14181f; }
        #summary.pass { border: 1px solid #2ecc71; color: #2ecc71; }
        #summary.fail { border: 1px solid #ff4757; color: #ff4757; }
        #summary.running { border: 1px solid #f1c40f; color: #f1c40f; }
        #results { list-style: none; padding: 0; margin: 0 0 16px 0; font-size: 13px; }
        #results li { padding: 4px 8px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        #results li.pass::before { content: "✅ "; }
        #results li.fail::before { content: "❌ "; }
        #results li.fail { color: #ff6b7a; }
        #results .detail { color: #a0a8c0; font-size: 12px; margin-left: 24px; display: block; }
        #app-frame { width: 1000px; height: 640px; max-width: 100%; border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; }
        .frame-note { color: #606880; font-size: 11px; margin-top: 4px; }
    </style>
</head>
<body>
    <h1>Chem-Assembler 回帰テスト</h1>
    <p class="note">実アプリ（下のiframe）を実イベントで駆動して検証します。コミット前にこのページを開き、全テストの合格を確認してください（開発方針 6.1章）。ローカルサーバー経由で開くこと。</p>
    <div id="summary" class="running">読み込み中...</div>
    <ul id="results"></ul>
    <iframe id="app-frame" src="index.html?v=110"></iframe>
    <p class="frame-note">※テスト実行中はiframe内のアプリ状態が変化します。実行後は最終テストの状態のまま残ります。</p>
    <script src="tests.js?v=110"></script>
</body>
</html>
